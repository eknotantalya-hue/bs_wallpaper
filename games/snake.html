<title>Black Symbols — Snake Alphabet Test</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:none}
html,body{width:100%;height:100%;overflow:hidden;background:#111;color:#111;font-family:Arial,Helvetica,sans-serif}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;background:#f5f5f3}
#gameArea{height:66.666vh;background:#fff;position:relative;border-bottom:4px solid #111;overflow:hidden}
#hud{position:absolute;left:0;top:0;width:100%;display:flex;justify-content:space-between;align-items:flex-start;padding:10px;z-index:5;pointer-events:none}
.hudBox{background:rgba(255,255,255,.9);border:2px solid #111;border-radius:10px;padding:8px 10px;font-family:"Arial Black",Arial,sans-serif;font-size:12px;line-height:1.25;letter-spacing:.04em;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.hudBox.coin{border-color:#FF8700}
#msg{position:absolute;left:50%;top:46px;transform:translateX(-50%);z-index:6;background:#111;color:#fff;border-radius:999px;padding:8px 14px;font-family:"Arial Black",Arial,sans-serif;font-size:12px;letter-spacing:.05em;text-align:center;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
#playCanvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block;background:#fff}
#controls{height:33.334vh;background:#f5f5f3;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;padding:14px;position:relative}
.ctrl{border:3px solid #111;background:#fff;border-radius:18px;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #111;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ctrl:active{transform:translateY(4px);box-shadow:0 1px 0 #111;background:#FF8700}
.ctrl::before{content:"";width:0;height:0;border-style:solid}
.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}
.up::before{border-width:0 34px 54px 34px;border-color:transparent transparent #111 transparent}
.down::before{border-width:54px 34px 0 34px;border-color:#111 transparent transparent transparent}
.left::before{border-width:34px 54px 34px 0;border-color:transparent #111 transparent transparent}
.right::before{border-width:34px 0 34px 54px;border-color:transparent transparent transparent #111}
.smallBtns{position:absolute;left:14px;right:14px;top:8px;display:flex;justify-content:space-between;pointer-events:none}
.smallBtns button{pointer-events:auto;border:none;border-radius:999px;background:#111;color:#fff;font-family:"Arial Black",Arial,sans-serif;font-size:11px;letter-spacing:.06em;padding:7px 10px}
#winPanel{position:fixed;inset:0;background:rgba(0,0,0,.74);z-index:50;display:none;align-items:center;justify-content:center;padding:12px;touch-action:auto}
#winPanel.show{display:flex}
.winCard{background:#fff;border-radius:14px;border:3px solid #111;padding:12px;width:min(96vw,560px);max-height:96vh;overflow:auto;touch-action:auto}
.winCard h2{font-family:"Arial Black",Arial,sans-serif;font-size:18px;text-align:center;margin-bottom:8px;letter-spacing:.04em}
.winCard p{text-align:center;font-size:13px;line-height:1.45;color:#555;margin-bottom:10px}
#finalCanvas{width:100%;height:auto;display:block;border:1px solid #ddd;border-radius:10px;background:#fff}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.actions button,.actions a{flex:1;min-width:130px;border:none;text-decoration:none;text-align:center;border-radius:8px;background:#111;color:#fff;font-family:"Arial Black",Arial,sans-serif;font-size:12px;letter-spacing:.05em;padding:12px 10px;touch-action:manipulation}
.actions .orange{background:#FF8700;color:#111}
@media(max-height:650px){.hudBox{font-size:10px;padding:6px 8px}#msg{font-size:10px;top:40px}#controls{gap:8px;padding:10px}.ctrl{border-radius:14px}.up::before{border-width:0 25px 40px 25px}.down::before{border-width:40px 25px 0 25px}.left::before{border-width:25px 40px 25px 0}.right::before{border-width:25px 0 25px 40px}}
</style>
</head>

// Russian letters sharing Latin SVG shapes
SL["А"] = SL["A"];
SL["В"] = SL["B"];
SL["Е"] = SL["E"];
SL["К"] = SL["K"];
SL["О"] = SL["O"];
SL["Р"] = SL["P"];
SL["С"] = SL["C"];
SL["Т"] = SL["T"];
SL["Х"] = SL["X"];
SL["Н"] = SL["H"];
SL["М"] = SL["M"];
const ORANGE="#FF8700";
const ALPHABET="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const BASE_LEVEL=1;
function difficultyForLevel(level){const t=Math.max(0,Math.min(99,level-1))/99;return{speedMs:Math.round(170-90*t),letterTTL:Math.round(9000-5200*t),extraObstacles:Math.round(0+18*t),boardMargin:Math.round(2+5*t)}}
let level=BASE_LEVEL,coins=0,gridW=24,gridH=32,cell=16,offsetX=0,offsetY=0,snake=[],dir={x:0,y:-1},nextDir={x:0,y:-1},currentIndex=0,letter=null,letterBornAt=0,timer=null,paused=false,gameOver=false;
const play=document.getElementById("playCanvas"),pctx=play.getContext("2d"),finalCanvas=document.getElementById("finalCanvas"),fctx=finalCanvas.getContext("2d");
function bsUpper(text){return String(text||"").replace(/i/g,"I").replace(/ı/g,"I").toUpperCase()}
function vbP(vb){const p=vb.split(" ").map(Number);return{x:p[0],y:p[1],w:p[2],h:p[3]}}
function letterPathCanvas(ch,size,color="#111"){ch=bsUpper(ch);const d=SL[ch],oc=document.createElement("canvas");oc.width=size;oc.height=size;const cx=oc.getContext("2d");if(!d){cx.fillStyle=color;cx.font="900 "+Math.round(size*.78)+"px Arial Black";cx.textAlign="center";cx.textBaseline="middle";cx.fillText(ch,size/2,size/2);return oc}const v=vbP(d.vb),scale=Math.min(size*.78/v.w,size*.78/v.h),x=(size-v.w*scale)/2,y=(size-v.h*scale)/2;cx.save();cx.translate(x,y);cx.scale(scale,scale);cx.fillStyle=color;d.p.forEach(pd=>cx.fill(new Path2D(pd),"evenodd"));cx.restore();return oc}
function resize(){const rect=play.parentElement.getBoundingClientRect(),dpr=Math.max(1,window.devicePixelRatio||1);play.width=Math.floor(rect.width*dpr);play.height=Math.floor(rect.height*dpr);play.style.width=rect.width+"px";play.style.height=rect.height+"px";pctx.setTransform(dpr,0,0,dpr,0,0);gridW=24;gridH=32;cell=Math.floor(Math.min(rect.width/gridW,rect.height/gridH));offsetX=Math.floor((rect.width-gridW*cell)/2);offsetY=Math.floor((rect.height-gridH*cell)/2);draw()}
function startSnake(){const x=Math.floor(gridW/2),y=gridH-3;snake=[{x:x,y:y},{x:x,y:y+1}];dir={x:0,y:-1};nextDir={x:0,y:-1}}
function restartGame(){level=BASE_LEVEL;coins=0;currentIndex=0;paused=false;gameOver=false;document.getElementById("coinText").textContent=coins;document.getElementById("levelText").textContent=level;document.getElementById("rankText").textContent=rankForLevel(level);document.getElementById("winPanel").classList.remove("show");startSnake();spawnLetter();setMsg("A harfini yakala");loopStart();draw()}
function rankForLevel(l){if(l<10)return"BLACK ROOKIE";if(l<25)return"SYMBOL HUNTER";if(l<50)return"MAMBA RIDER";if(l<75)return"DARK MASTER";return"BLACK LEGEND"}
function setMsg(t){document.getElementById("msg").textContent=t}
function randomEmptyCell(){for(let i=0;i<500;i++){const x=Math.floor(Math.random()*gridW),y=Math.floor(Math.random()*gridH);if(y>gridH-2)continue;if(!snake.some(s=>s.x===x&&s.y===y))return{x,y}}return{x:2,y:2}}
function spawnLetter(){const ch=ALPHABET[currentIndex];letter=Object.assign(randomEmptyCell(),{ch});letterBornAt=Date.now()}
function setDir(name){const nd={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}}[name];if(!nd||gameOver)return;if(snake.length>1&&nd.x===-dir.x&&nd.y===-dir.y)return;nextDir=nd}
function togglePause(){if(gameOver)return;paused=!paused;setMsg(paused?"PAUSE":(letter?letter.ch+" harfini yakala":""))}
function loopStart(){if(timer)clearInterval(timer);const d=difficultyForLevel(level);timer=setInterval(tick,d.speedMs)}
function tick(){if(paused||gameOver)return;const d=difficultyForLevel(level);if(letter&&Date.now()-letterBornAt>d.letterTTL){const old=letter.ch;letter=Object.assign(randomEmptyCell(),{ch:old});letterBornAt=Date.now();setMsg(old+" kaçtı! Yeni yerde yakala.")}dir=nextDir;const h=snake[0],nh={x:h.x+dir.x,y:h.y+dir.y};if(nh.x<0||nh.x>=gridW||nh.y<0||nh.y>=gridH){fail("Duvara çarptın. Yeniden başla.");return}if(snake.some(s=>s.x===nh.x&&s.y===nh.y)){fail("Kendi kuyruğuna çarptın. Yeniden başla.");return}snake.unshift(nh);if(letter&&nh.x===letter.x&&nh.y===letter.y){currentIndex++;if(currentIndex>=ALPHABET.length){win();return}spawnLetter();setMsg(ALPHABET[currentIndex]+" harfini yakala")}else{snake.pop()}draw()}
function fail(t){setMsg(t);startSnake();spawnLetter();draw()}
function win(){gameOver=true;if(timer)clearInterval(timer);coins+=5;document.getElementById("coinText").textContent=coins;setMsg("Kazandın! +5 BLACK COIN");renderFinal();document.getElementById("winPanel").classList.add("show")}
function draw(){const rect=play.parentElement.getBoundingClientRect();pctx.clearRect(0,0,rect.width,rect.height);pctx.fillStyle="#fff";pctx.fillRect(0,0,rect.width,rect.height);pctx.strokeStyle="rgba(0,0,0,.035)";pctx.lineWidth=1;for(let x=0;x<=gridW;x++){pctx.beginPath();pctx.moveTo(offsetX+x*cell,offsetY);pctx.lineTo(offsetX+x*cell,offsetY+gridH*cell);pctx.stroke()}for(let y=0;y<=gridH;y++){pctx.beginPath();pctx.moveTo(offsetX,offsetY+y*cell);pctx.lineTo(offsetX+gridW*cell,offsetY+y*cell);pctx.stroke()}if(letter){const pulse=1+Math.sin(Date.now()/180)*.05,lc=letterPathCanvas(letter.ch,Math.round(cell*2.4),"#111"),lx=offsetX+letter.x*cell+cell/2-lc.width/2*pulse,ly=offsetY+letter.y*cell+cell/2-lc.height/2*pulse;pctx.save();pctx.globalAlpha=.13;pctx.fillStyle=ORANGE;pctx.beginPath();pctx.arc(offsetX+letter.x*cell+cell/2,offsetY+letter.y*cell+cell/2,cell*1.25,0,Math.PI*2);pctx.fill();pctx.globalAlpha=1;pctx.drawImage(lc,lx,ly,lc.width*pulse,lc.height*pulse);pctx.restore()}snake.forEach((part,i)=>{const x=offsetX+part.x*cell,y=offsetY+part.y*cell;pctx.fillStyle=i===0?ORANGE:"#111";pctx.fillRect(x+1,y+1,cell-2,cell-2)})}
function buildGarlandLetter(ch,bodyH,color){ch=bsUpper(ch);const d=SL[ch],oc=document.createElement("canvas");if(!d){oc.width=Math.ceil(bodyH*.75);oc.height=Math.ceil(bodyH);const cx=oc.getContext("2d");cx.fillStyle=color;cx.font="900 "+Math.round(bodyH*.75)+"px Arial Black";cx.textAlign="center";cx.textBaseline="middle";cx.fillText(ch,oc.width/2,oc.height/2);return{canvas:oc,w:oc.width,h:oc.height,anchor:bodyH*.09}}const v=vbP(d.vb),sc=bodyH/v.h;oc.width=Math.ceil(v.w*sc);oc.height=Math.ceil(bodyH);const cx=oc.getContext("2d");cx.save();cx.scale(sc,sc);cx.fillStyle=color;d.p.forEach(pd=>cx.fill(new Path2D(pd),"evenodd"));cx.restore();return{canvas:oc,w:oc.width,h:oc.height,anchor:bodyH*.09}}
function measureRow(word,bodyH){let w=0,gap=bodyH*.08;Array.from(word).forEach((ch,i)=>{if(ch===" "){w+=bodyH*.45;return}const lb=buildGarlandLetter(ch,bodyH,"#111");w+=lb.w;if(i<word.length-1)w+=gap});return w}
function drawGarlandRow(ctx,word,y,bodyH){const W=finalCanvas.width,total=measureRow(word,bodyH);let x=W/2-total/2;const ropeY=y-bodyH*.20,gap=bodyH*.08;ctx.strokeStyle="#111";ctx.lineWidth=3;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x-80,ropeY);ctx.quadraticCurveTo(W/2,ropeY+bodyH*.25,x+total+80,ropeY);ctx.stroke();Array.from(word).forEach((ch,i)=>{if(ch===" "){x+=bodyH*.45;return}const lb=buildGarlandLetter(ch,bodyH,"#111"),t=(x+lb.w/2-(W/2-total/2-80))/(total+160),ry=ropeY+Math.sin(Math.PI*t)*bodyH*.25;ctx.save();ctx.globalAlpha=.12;ctx.filter="blur(3px)";ctx.drawImage(lb.canvas,x+4,ry-lb.anchor+4);ctx.filter="none";ctx.globalAlpha=1;ctx.drawImage(lb.canvas,x,ry-lb.anchor);ctx.restore();x+=lb.w+gap})}
function renderFinal(){const W=finalCanvas.width,H=finalCanvas.height;fctx.fillStyle="#fff";fctx.fillRect(0,0,W,H);fctx.fillStyle=ORANGE;fctx.font="900 34px Arial Black";fctx.textAlign="left";fctx.fillText("BLACK COIN +5",52,70);fctx.fillStyle="#111";fctx.textAlign="right";fctx.fillText("LEVEL 1/100",W-52,62);fctx.font="900 25px Arial Black";fctx.fillText("BLACK ROOKIE",W-52,96);drawGarlandRow(fctx,"ЧЕРНАЯ",430,135);drawGarlandRow(fctx,"МАМБА",600,155);fctx.font="42px Bebas Neue, Arial";fctx.textAlign="center";fctx.fillStyle="#111";fctx.fillText("blacksymbols.com",W/2,H-70)}
function downloadFinal(){finalCanvas.toBlob(blob=>{const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="black_symbols_snake_black_mamba.jpg";document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},2000)},"image/jpeg",.96)}
window.addEventListener("resize",resize);document.addEventListener("keydown",e=>{const k=e.key.toLowerCase();if(k==="arrowup"||k==="w")setDir("up");if(k==="arrowdown"||k==="s")setDir("down");if(k==="arrowleft"||k==="a")setDir("left");if(k==="arrowright"||k==="d")setDir("right");if(k===" ")togglePause()});resize();restartGame();setInterval(()=>{if(!gameOver&&!paused)draw()},120);
</script>
